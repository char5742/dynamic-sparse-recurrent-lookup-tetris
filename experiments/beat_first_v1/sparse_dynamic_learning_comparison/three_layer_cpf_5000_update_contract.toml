[success_gate]
baseline_update = 0
final_update = 5000
require_finite_metrics = true
require_no_route_or_bucket_cap_failure = true
require_prefilter_activation = true
require_held_ndcg_delta = 0.025
require_held_pairwise_delta = 0.025
require_held_top1_delta = 0.02
