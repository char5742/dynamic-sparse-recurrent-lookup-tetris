[stop_conditions]
conditions = [
  "trainer exits nonzero",
  "another Julia process overlaps",
  "the independent bucket-entry cap is exceeded",
  "the exact-score cap is exceeded after prefiltering and probe reservation",
  "any loss, gradient, Q value, or margin is non-finite",
  "the update-2500 midpoint gate is not met",
  "the update-5000 success gate is not met",
]

[interpretation]
allowed = "bounded teacher-ranking learning-signal evidence"
forbidden = [
  "game-strength claim",
  "old-model-beat claim",
  "validation-game-seed claim",
  "sealed-test claim",
]
